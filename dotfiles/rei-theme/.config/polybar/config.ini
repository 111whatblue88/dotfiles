# Rei Dotfiles
# Polybar Config
#         {HARDWARE} 				    		{SOFTWARE}
#[{i3}] [{storage}] [{ram}{cpu}{battery}] [{text}] [{cmus}] [{wpm}{volume}{wifi}{time}]

[global]
interval=2

[colors]
white="#ffebec"
black="#000000"
transparentBlack="#aa000000"
red="#90201f"
blue="#87ceeb"
yellow="#ffff00"
magenta="#d27389"

format-blue=#87ceeb
format-red=%{F#90201f}

text=${self.white}
textAlt=${self.blue}
textUrgent=${self.red}
border=${self.red}
background=${self.transparentBlack}

# base bar that all bars inherit from
[bar/baseline]
override-redirect=true
height=30
offset-y=5
background=${colors.background}
foreground=${colors.text}
radius=8.0
border-size=2
border-color=${colors.border}
separator=" | "
font-0=JetBrainsMono Nerd Font Propo:size=12;2

wm-restack=i3

[settings]
pseudo-transparency=true

# i3 bar
[module/i3]
type=internal/i3
enable-scroll=false

format=<label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 1
label-mode-background = ${colors.background}

label-focused = (%index%)
label-focused-foreground=${colors.textAlt}
label-focused-background = ${colors.background}
label-focused-padding = 1

label-unfocused = [%index%]
label-unfocused-padding = 1

[bar/i3bar]
inherit=bar/baseline
width=155
offset-x=10
modules-left=i3

# storage bar
[module/filesystem]
type=internal/fs
interval=${global.interval}
mount-0=/
spacing=1

format-unmounted=<label-unmounted>
format-mounted=<label-mounted>

label-unmounted=%mountpoint%:Ņ½É
label-mounted=%mountpoint%: %percentage_used%% of %total%

[bar/storagebar]
inherit=bar/baseline
width=175
offset-x=175
modules-center=filesystem

# hardware bar
[module/memory]
type=internal/memory
interval=${global.interval}
format="Ņ┐ģ: %{F#87ceeb}<label>"
label=%gb_used%
[module/cpu]
type=internal/cpu
interval=${global.interval}
format="’Æ╝: %{F#87ceeb}<label>"
label=%percentage%%
[module/battery]
type=internal/battery
poll-interval=${global.interval}
full-at=99
low-at=10

battery=BAT0
adapter=AC

format-charging=¾░ü╣: <animation-charging> %{F#87ceeb}<label-charging>
format-discharging=¾░ü╣: <animation-discharging> %{F#87ceeb}<label-discharging>
format-full=¾░ü╣: ’ēĆ  %{F#87ceeb}<label-full>
format-low=¾░ü╣: %{F#90201f}<animation-low> %{F#87ceeb}<label-low>

label-charging=%percentage%%
label-discharging=%percentage%%
label-full=%percentage%%
label-low=%percentage%%

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750

animation-discharging-0 = ’ēĆ
animation-discharging-1 = ’ēü
animation-discharging-2 = ’ēé
animation-discharging-3 = ’ēā
animation-discharging-4 = ’ēä
animation-discharging-framerate = 500

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[bar/hardwarebar]
inherit=bar/baseline
width=355
offset-x=360
modules-center=memory cpu battery

# text bar
[module/text]
type=custom/text
format=<label>
format-foreground=${colors.text}

label="keeping secrets"

[bar/textbar]
inherit=bar/baseline
width=1900
offset-x=10
modules-center=text
border-color=${colors.blue}

# cmus bar
[module/player-cmus]
type = custom/script
exec = ~/.config/polybar/player-cmus.sh
tail = true

[bar/cmusbar]
inherit=bar/baseline
width=400
offset-x=1150
modules-center=player-cmus

# software bar
[module/info-hackspeed]
type=custom/script
exec=~/.config/polybar/info-hackspeed.sh
tail=true
[module/pulseaudio]
type=internal/pulseaudio
interval=${global.interval}
format-volume=’Ć©: %{F#87ceeb}<label-volume>
format-muted=Ņ╗©
[module/wifi]
type=internal/network
interval=${global.interval}
interface=wlan0
format-connected=%{F#87ceeb}<label-connected>
format-disconnected=%{F#87ceeb}<label-disconnected>
label-connected=¾░¢®
label-disconnected=¾░¢¬
[module/date]
type=internal/date
interval=${global.interval}
time=%I:%M
format=¾▒æō: %{F#87ceeb}<label>
label=%time%

[bar/softwarebar]
inherit=bar/baseline
width=350
offset-x=1560
modules-center=info-hackspeed pulseaudio wifi date










